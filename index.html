<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulta Agroquímicos – JSON DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Forzamos que los colores se vean correctamente */
        .risk-ok { background-color: #dcfce7 !important; color: #065f46 !important; }
        .risk-caution { background-color: #fef9c3 !important; color: #854d0e !important; }
        .risk-bad { background-color: #fee2e2 !important; color: #991b1b !important; }
        .risk-unknown { background-color: #e5e7eb !important; color: #374151 !important; }
        .badge { padding: .25rem .5rem; border-radius: .5rem; font-weight: 600; display:inline-block; font-size: 12px; }
        .sticky-th { position: sticky; top: 0; background: white; z-index: 10; border-bottom: 2px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-6">
            <h1 class="text-2xl md:text-3xl font-bold">Consulta de compatibilidad</h1>
            <p id="status" class="text-sm text-blue-600">Cargando base de datos...</p>
        </header>

        <section class="flex items-center gap-4 mb-4">
            <label class="text-sm font-medium">Categoría:</label>
            <select id="categoria" class="rounded-xl border px-3 py-2 bg-white outline-none focus:ring-2 focus:ring-blue-500"></select>
        </section>

        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl shadow p-6 md:col-span-2">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Producto A</label>
                        <input list="productos" id="prodA" class="mt-1 w-full rounded-xl border px-3 py-2" placeholder="Escriba producto..." />
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Producto B</label>
                        <input list="productos" id="prodB" class="mt-1 w-full rounded-xl border px-3 py-2" placeholder="Escriba producto..." />
                    </div>
                </div>
                <datalist id="productos"></datalist>
                <button id="btnEvaluar" class="mt-4 w-full bg-gray-900 text-white py-2 rounded-xl font-bold hover:bg-black transition">Evaluar Mezcla</button>
                
                <div id="resultado" class="mt-6 p-4 border-2 border-dashed rounded-xl hidden">
                    <div class="flex items-center gap-2 mb-2">
                        <span id="resRiesgo" class="badge"></span>
                    </div>
                    <p id="resNotas" class="text-sm text-gray-600 italic"></p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="font-bold mb-3">Referencias</h2>
                <div class="space-y-2">
                    <div class="flex items-center gap-2"><div class="w-3 h-3 risk-ok rounded-full"></div> <span class="text-xs">Compatible</span></div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 risk-caution rounded-full"></div> <span class="text-xs">Precaución</span></div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 risk-bad rounded-full"></div> <span class="text-xs">Incompatible</span></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="overflow-auto max-h-[500px]">
                <table class="min-w-full text-xs">
                    <thead><tr id="headerRow"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let DBs = {};
        let categoriaActual = "";

        const norm = s => (s || "").toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
        const pairKey = (a,b) => { const A = norm(a), B = norm(b); return A < B ? `${A}|${B}` : `${B}|${A}`; };

        // Función para asignar color según el texto de riesgo
        function asignarClase(r) {
            const riesgo = norm(r);
            if (riesgo.includes('no') || riesgo.includes('alto') || riesgo.includes('incompatible')) return 'risk-bad';
            if (riesgo.includes('pre') || riesgo.includes('medio') || riesgo.includes('precaucion')) return 'risk-caution';
            if (riesgo.includes('com') || riesgo.includes('bajo') || riesgo.includes('compatible')) return 'risk-ok';
            return 'risk-unknown';
        }

        async function cargarDatos() {
            try {
                const respuesta = await fetch('data.json');
                DBs = await respuesta.json();
                document.getElementById('status').textContent = "✅ Base de datos online";
                
                const select = document.getElementById('categoria');
                select.innerHTML = "";
                Object.keys(DBs).forEach((cat, index) => {
                    if(index === 0) categoriaActual = cat;
                    const opt = document.createElement('option');
                    opt.value = cat; opt.textContent = cat;
                    select.appendChild(opt);
                });

                renderizar();
            } catch (error) {
                document.getElementById('status').textContent = "❌ Error al cargar data.json";
                console.error(error);
            }
        }

        function renderizar() {
            const data = DBs[categoriaActual];
            if(!data) return;

            const datalist = document.getElementById('productos');
            const header = document.getElementById('headerRow');
            const body = document.getElementById('tableBody');

            datalist.innerHTML = "";
            data.productos.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; datalist.appendChild(opt);
            });

            header.innerHTML = '<th class="sticky-th px-4 py-2 bg-gray-100 text-left">Producto</th>';
            data.productos.forEach(p => {
                header.innerHTML += `<th class="sticky-th px-2 py-2 bg-gray-100 text-center">${p}</th>`;
            });

            body.innerHTML = "";
            data.productos.forEach(rowP => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="font-bold px-4 py-2 border-b bg-white sticky left-0 z-1">${rowP}</td>`;
                data.productos.forEach(colP => {
                    const td = document.createElement('td');
                    td.className = "px-2 py-2 text-center border-b";
                    if(rowP === colP) {
                        td.innerHTML = '<span class="text-gray-300">-</span>';
                    } else {
                        const info = data.compat[pairKey(rowP, colP)];
                        const r = info ? info.riesgo : "Sin datos";
                        const clase = asignarClase(r);
                        td.innerHTML = `<div class="w-4 h-4 mx-auto rounded-full ${clase}" title="${r}"></div>`;
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        document.getElementById('categoria').onchange = (e) => {
            categoriaActual = e.target.value;
            renderizar();
        };

        document.getElementById('btnEvaluar').onclick = () => {
            const a = document.getElementById('prodA').value;
            const b = document.getElementById('prodB').value;
            const resDiv = document.getElementById('resultado');
            
            const info = DBs[categoriaActual].compat[pairKey(a, b)];
            resDiv.classList.remove('hidden');
            const r = info ? info.riesgo : "Sin datos";
            
            const badge = document.getElementById('resRiesgo');
            badge.textContent = r;
            badge.className = "badge " + asignarClase(r);
            document.getElementById('resNotas').textContent = info ? info.notas : "Sin detalles.";
        };

        cargarDatos();
    </script>
</body>
</html>
