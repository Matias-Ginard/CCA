<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulta Agroquímicos – JSON DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .risk-ok { background-color: #22c55e !important; } 
        .risk-caution { background-color: #facc15 !important; } 
        .risk-bad { background-color: #ef4444 !important; } 
        .risk-unknown { background-color: #9ca3af !important; } 
        
        .badge { padding: .25rem .75rem; border-radius: .5rem; font-weight: 800; display:inline-block; font-size: 13px; color: #fff; }
        .dot { width: 22px; height: 22px; border-radius: 999px; margin: 0 auto; cursor: pointer; transition: transform 0.1s; }
        .dot:hover { transform: scale(1.2); border: 2px solid #000; }
        .sticky-th { position: sticky; top: 0; background: white; z-index: 10; border-bottom: 2px solid #e5e7eb; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; border-right: 2px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-6">
            <h1 class="text-2xl md:text-3xl font-bold">Consulta de compatibilidad</h1>
            <p id="status" class="text-sm text-blue-600 font-semibold">Cargando base de datos...</p>
        </header>

        <section class="flex items-center gap-4 mb-4">
            <label class="text-sm font-medium">Categoría:</label>
            <select id="categoria" class="rounded-xl border px-3 py-2 bg-white outline-none focus:ring-2 focus:ring-blue-500 font-bold shadow-sm"></select>
        </section>

        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl shadow p-6 md:col-span-2">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Producto A</label>
                        <input list="productos" id="prodA" class="mt-1 w-full rounded-xl border px-3 py-2" placeholder="Escriba producto..." />
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Producto B</label>
                        <input list="productos" id="prodB" class="mt-1 w-full rounded-xl border px-3 py-2" placeholder="Escriba producto..." />
                    </div>
                </div>
                <datalist id="productos"></datalist>
                <button id="btnEvaluar" class="mt-4 w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow-lg">Evaluar Mezcla</button>
                
                <div id="resultado" class="mt-6 p-4 border-2 border-dashed rounded-xl hidden">
                    <div class="flex items-center gap-2 mb-2">
                        <span id="resRiesgo" class="badge"></span>
                    </div>
                    <p id="resNotas" class="text-sm text-gray-600 font-medium"></p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="font-bold mb-3">Referencias</h2>
                <div class="space-y-3">
                    <div class="flex items-center gap-3"><div class="dot risk-ok"></div> <span class="text-xs font-bold">Compatible</span></div>
                    <div class="flex items-center gap-3"><div class="dot risk-caution"></div> <span class="text-xs font-bold">Precaución</span></div>
                    <div class="flex items-center gap-3"><div class="dot risk-bad"></div> <span class="text-xs font-bold">Incompatible</span></div>
                    <p class="text-[10px] text-gray-400 mt-2">* Haz clic en los círculos de la tabla para evaluar rápido.</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="overflow-auto max-h-[500px]">
                <table class="min-w-full text-xs">
                    <thead><tr id="headerRow"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let DBs = {};
        let categoriaActual = "";

        const norm = s => (s || "").toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
        const pairKey = (a,b) => { const A = norm(a), B = norm(b); return A < B ? `${A}|${B}` : `${B}|${A}`; };

        function getClase(txt) {
            const t = norm(txt);
            if (t.includes('alto') || t.includes('incompatible') || t.includes('no')) return 'risk-bad';
            if (t.includes('medio') || t.includes('preca') || t.includes('alerta')) return 'risk-caution';
            if (t.includes('bajo') || t.includes('compatible') || t === 'si') return 'risk-ok';
            return 'risk-unknown';
        }

        async function cargar() {
            try {
                const r = await fetch('data.json');
                DBs = await r.json();
                document.getElementById('status').textContent = "✅ Base de datos online";
                const select = document.getElementById('categoria');
                Object.keys(DBs).forEach((cat, i) => {
                    if(i === 0) categoriaActual = cat;
                    const opt = document.createElement('option');
                    opt.value = cat; opt.textContent = cat;
                    select.appendChild(opt);
                });
                renderizar();
            } catch (e) { document.getElementById('status').textContent = "❌ Error al cargar data.json"; }
        }

        function evaluar(a, b) {
            document.getElementById('prodA').value = a;
            document.getElementById('prodB').value = b;
            const info = DBs[categoriaActual].compat[pairKey(a, b)];
            const resDiv = document.getElementById('resultado');
            resDiv.classList.remove('hidden');
            const riesgoTxt = info ? info.riesgo : "Sin datos";
            const badge = document.getElementById('resRiesgo');
            badge.textContent = riesgoTxt.toUpperCase();
            badge.className = "badge " + getClase(riesgoTxt);
            document.getElementById('resNotas').textContent = info ? (info.notas || "Sin notas.") : "No hay datos.";
        }

        function renderizar() {
            const data = DBs[categoriaActual];
            const datalist = document.getElementById('productos');
            const header = document.getElementById('headerRow');
            const body = document.getElementById('tableBody');

            datalist.innerHTML = "";
            data.productos.forEach(p => { const opt = new Option(p, p); datalist.appendChild(opt); });

            header.innerHTML = '<th class="sticky-th px-4 py-3 bg-gray-100 text-left sticky-col">Producto</th>';
            data.productos.forEach(p => { header.innerHTML += `<th class="sticky-th px-2 py-3 bg-gray-100 text-center border-x">${p}</th>`; });

            body.innerHTML = "";
            data.productos.forEach(rowP => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="font-bold px-4 py-2 border-b bg-white sticky-col">${rowP}</td>`;
                data.productos.forEach(colP => {
                    const td = document.createElement('td');
                    td.className = "px-2 py-2 text-center border-b border-r";
                    if(rowP === colP) {
                        td.innerHTML = '<span class="text-gray-300">-</span>';
                    } else {
                        const info = data.compat[pairKey(rowP, colP)];
                        const riesgo = info ? info.riesgo : "Sin datos";
                        const circulo = document.createElement('div');
                        circulo.className = `dot ${getClase(riesgo)}`;
                        circulo.onclick = () => evaluar(rowP, colP);
                        td.appendChild(circulo);
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        document.getElementById('categoria').onchange = (e) => { categoriaActual = e.target.value; renderizar(); };
        document.getElementById('btnEvaluar').onclick = () => evaluar(document.getElementById('prodA').value, document.getElementById('prodB').value);

        cargar();
    </script>
</body>
</html>
