<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulta Agroquímicos – Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .risk-ok { background-color: #22c55e !important; } 
        .risk-caution { background-color: #facc15 !important; } 
        .risk-bad { background-color: #ef4444 !important; } 
        .risk-unknown { background-color: #9ca3af !important; } 
        
        .badge { padding: .25rem .75rem; border-radius: .5rem; font-weight: 800; display:inline-block; font-size: 13px; color: #fff; }
        .dot { width: 22px; height: 22px; border-radius: 999px; margin: 0 auto; cursor: pointer; transition: transform 0.1s; border: 1px solid rgba(0,0,0,0.1); }
        .dot:hover { transform: scale(1.2); border: 2px solid #000; }
        .sticky-th { position: sticky; top: 0; background: white; z-index: 10; border-bottom: 2px solid #e5e7eb; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; border-right: 2px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Gestión de Compatibilidad</h1>
                <p id="status" class="text-sm text-blue-600 font-semibold">Sincronizando base de datos...</p>
            </div>
            <button id="btnAbrirCarga" class="bg-gray-900 text-white px-5 py-2 rounded-xl font-bold hover:bg-black transition flex items-center gap-2 shadow-md">
                <span>🔒</span> Panel de Edición
            </button>
        </header>

        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-3xl shadow-sm border p-6 md:col-span-2">
                <div class="mb-6">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Categoría de Trabajo</label>
                    <select id="categoria" class="w-full mt-1 rounded-xl border-gray-200 border px-4 py-3 bg-gray-50 font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all"></select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-400">Producto A</label>
                        <input list="productos" id="prodA" class="mt-1 w-full rounded-xl border px-4 py-3 focus:border-blue-500 outline-none bg-white border-gray-200" placeholder="Buscar..." />
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-400">Producto B</label>
                        <input list="productos" id="prodB" class="mt-1 w-full rounded-xl border px-4 py-3 focus:border-blue-500 outline-none bg-white border-gray-200" placeholder="Buscar..." />
                    </div>
                </div>
                <datalist id="productos"></datalist>
                <button id="btnEvaluar" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">Analizar Mezcla</button>
                
                <div id="resultado" class="mt-8 p-6 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 hidden">
                    <div id="resRiesgo" class="badge mb-3"></div>
                    <p id="resNotas" class="text-gray-600 font-medium leading-relaxed"></p>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border p-6">
                <h2 class="font-bold mb-4 text-xs text-gray-400 uppercase tracking-widest">Niveles de Riesgo</h2>
                <div class="space-y-4">
                    <div class="flex items-center gap-4"><div class="dot risk-ok"></div> <span class="text-sm font-bold">Bajo (Limpieza 1)</span></div>
                    <div class="flex items-center gap-4"><div class="dot risk-caution"></div> <span class="text-sm font-bold">Medio (Limpieza 2)</span></div>
                    <div class="flex items-center gap-4"><div class="dot risk-bad"></div> <span class="text-sm font-bold">Alto (Limpieza 5)</span></div>
                    <div class="flex items-center gap-4"><div class="dot risk-unknown"></div> <span class="text-sm font-bold">Sin Datos</span></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden mb-12">
            <div class="overflow-auto max-h-[550px]">
                <table class="min-w-full text-xs">
                    <thead><tr id="headerRow"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <section id="seccionCarga" class="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-2xl hidden transition-all">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold">Administración de Cruces</h2>
                    <p class="text-slate-400">Complete los campos para añadir a la base de datos actual.</p>
                </div>
                <button id="btnCerrarCarga" class="bg-slate-800 p-3 rounded-full hover:bg-slate-700 transition">✕</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6 text-left">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Producto A</label>
                    <input id="inA" type="text" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nombre...">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Producto B</label>
                    <input id="inB" type="text" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nombre...">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Riesgo</label>
                    <select id="inR" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Sin Datos</option>
                        <option value="Bajo">Bajo</option>
                        <option value="Medio">Medio</option>
                        <option value="Alto">Alto</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Limpieza</label>
                    <select id="inL" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Seleccione...</option>
                        <option value="1">1 (Verde)</option>
                        <option value="2">2 (Amarillo)</option>
                        <option value="5">5 (Rojo)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Notas</label>
                    <input id="inN" type="text" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="...">
