<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulta Agro – Paraguay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .risk-alto { background: #fee2e2; color: #991b1b; }
        .risk-medio { background: #fef9c3; color: #854d0e; }
        .risk-bajo { background: #dcfce7; color: #065f46; }
        .risk-none { background: #f9fafb; color: #d1d5db; }
        .badge { padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #e5e7eb; min-width: 180px; }
        thead th { position: sticky; top: 0; z-index: 30; background: #f3f4f6; }
    </style>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
            <h1 class="text-2xl font-black text-slate-800 mb-2">BUSCADOR DE MEZCLAS</h1>
            <div id="status" class="text-xs font-bold text-blue-500 mb-6 uppercase tracking-widest">Conectando base de datos...</div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">CATEGORÍA</label>
                    <select id="categoria" class="w-full p-3 border-2 rounded-xl bg-slate-50 outline-none focus:border-blue-500"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">FILTRAR PRODUCTOS</label>
                    <input type="text" id="filterTable" placeholder="Escribe para buscar en la tabla..." class="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                </div>
            </div>
        </div>

        <div id="resBox" class="mb-6 p-6 bg-white border-l-8 border-blue-500 rounded-xl shadow-md hidden">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase">Resultado del análisis</h3>
                    <div id="vRiesgo" class="badge text-lg mt-1 inline-block"></div>
                </div>
                <div class="text-right">
                    <span class="text-xs font-bold text-slate-400 uppercase">Limpieza</span>
                    <p id="vLimpieza" class="text-xl font-black text-slate-800"></p>
                </div>
            </div>
            <p id="vNotas" class="mt-4 text-slate-600 italic bg-slate-50 p-3 rounded-lg border"></p>
        </div>

        <div class="overflow-auto max-h-[70vh] bg-white rounded-2xl shadow-inner border">
            <table class="w-full text-left text-[10px]">
                <thead><tr id="hRow"></tr></thead>
                <tbody id="bBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let DBs = {};
        let catActual = "";

        // NORMALIZACIÓN AGRESIVA: Quita todo lo que no sea letras o números para comparar
        const clean = s => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '') : '';
        
        const pairKey = (a, b) => { 
            const A = clean(a), B = clean(b); 
            return A < B ? `${A}|${B}` : `${B}|${A}`; 
        };

        async function start() {
            try {
                const r = await fetch('data.json');
                DBs = await r.json();
                document.getElementById('status').textContent = "✅ SISTEMA ACTIVO";
                
                const sel = document.getElementById('categoria');
                Object.keys(DBs).forEach((c, i) => {
                    if(i===0) catActual = c;
                    const o = document.createElement('option');
                    o.value = c; o.textContent = c;
                    sel.appendChild(o);
                });
                draw();
            } catch(e) { document.getElementById('status').textContent = "❌ ERROR: NO SE ENCONTRÓ DATA.JSON"; }
        }

        function draw() {
            const busqueda = clean(document.getElementById('filterTable').value);
            const data = DBs[catActual];
            const h = document.getElementById('hRow');
            const b = document.getElementById('bBody');

            // Filtramos la lista de productos
            const prods = data.productos.filter(p => clean(p).includes(busqueda));

            // Header
            h.innerHTML = '<th class="sticky-col p-4 bg-slate-100 text-slate-500 font-bold uppercase border-b">Producto</th>';
            prods.forEach(p => {
                h.innerHTML += `<th class="p-3 border-b bg-slate-50 text-center min-w-[140px] font-bold text-slate-400 border-l">${p}</th>`;
            });

            // Filas
            b.innerHTML = "";
            prods.forEach(rowP => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 border-b transition";
                tr.innerHTML = `<td class="sticky-col p-4 font-bold text-slate-700 bg-white border-r shadow-sm">${rowP}</td>`;
                
                prods.forEach(colP => {
                    const td = document.createElement('td');
                    td.className = "p-2 text-center border-l";
                    if(rowP === colP) {
                        td.innerHTML = '<span class="text-slate-200">●</span>';
                    } else {
                        // AQUÍ ESTÁ EL TRUCO: Usamos clean() para generar la llave
                        const llave = pairKey(rowP, colP);
                        
                        // Buscamos en el JSON usando la llave limpia
                        // IMPORTANTE: En tu data.json las llaves de 'compat' deben estar limpias (sin espacios/paréntesis)
                        let info = data.compat[llave];
                        
                        const r = info ? info.riesgo : "";
                        const rNorm = clean(r);
                        let c = 'risk-none';
                        if(rNorm.includes('alto') || rNorm === '5') c = 'risk-alto';
                        else if(rNorm.includes('med') || rNorm === '6') c = 'risk-medio';
                        else if(rNorm.includes('bajo') || rNorm === '1') c = 'risk-bajo';

                        td.innerHTML = `<div class="w-8 h-8 mx-auto rounded-lg ${c} flex items-center justify-center cursor-pointer shadow-sm active:scale-90 transition" title="${r || 'Sin datos'}"></div>`;
                        td.onclick = () => {
                            const box = document.getElementById('resBox');
                            box.classList.remove('hidden');
                            document.getElementById('vRiesgo').textContent = r || "SIN REGISTRO";
                            document.getElementById('vRiesgo').className = "badge " + c;
                            document.getElementById('vLimpieza').textContent = info ? (info.limpieza || "-") : "-";
                            document.getElementById('vNotas').textContent = info ? (info.notas || "Mezcla permitida.") : `No hay información técnica cargada para esta mezcla específica.`;
                            box.scrollIntoView({behavior: 'smooth', block: 'center'});
                        };
                    }
                    tr.appendChild(td);
                });
                b.appendChild(tr);
            });
        }

        document.getElementById('categoria').onchange = (e) => { catActual = e.target.value; draw(); };
        document.getElementById('filterTable').oninput = draw;
        start();
    </script>
</body>
</html>
