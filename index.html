<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulta Agroquímicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .risk-alto { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .risk-medio { background: #fef9c3; color: #854d0e; border: 1px solid #facc15; }
        .risk-bajo { background: #dcfce7; color: #065f46; border: 1px solid #4ade80; }
        .risk-none { background: #f9fafb; color: #9ca3af; border: 1px solid #e5e7eb; }
        .badge { padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #e5e7eb; min-width: 200px; }
        thead th { position: sticky; top: 0; z-index: 30; background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="max-w-7xl mx-auto p-4">
        <header class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
            <h1 class="text-2xl font-black text-slate-800">CONSULTA TÉCNICA AGRO</h1>
            <p id="status" class="text-xs font-bold text-blue-600 mt-1 uppercase tracking-tighter italic">Cargando base de datos...</p>
        </header>

        <div class="grid md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl border">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Seleccionar Rubro</label>
                <select id="categoria" class="w-full p-2 border rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500"></select>
            </div>
            <div class="bg-white p-4 rounded-xl border">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Filtrar Productos en Tabla</label>
                <input type="text" id="filterTable" placeholder="Escriba nombre del producto..." class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div id="resBox" class="mb-6 p-6 bg-white border-l-8 border-blue-600 rounded-xl shadow-md hidden">
            <div class="flex justify-between items-center mb-4">
                <span id="vRiesgo" class="badge text-sm"></span>
                <div class="text-right"><span class="text-[10px] font-bold text-slate-400 block uppercase">Limpieza</span><b id="vLimpieza" class="text-lg"></b></div>
            </div>
            <p id="vNotas" class="text-sm text-slate-600 italic bg-slate-50 p-3 rounded-lg"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border">
            <div class="overflow-auto max-h-[65vh]">
                <table class="w-full text-[10px] text-left">
                    <thead><tr id="hRow"></tr></thead>
                    <tbody id="bBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let DBs = {};
        let catActual = "";

        // LIMPIEZA EXTREMA: Solo deja letras y números para que la comparación no falle nunca
        const clean = s => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '') : '';
        
        const pairKey = (a, b) => { 
            const A = clean(a), B = clean(b); 
            return A < B ? `${A}|${B}` : `${B}|${A}`; 
        };

        async function start() {
            try {
                const r = await fetch('data.json');
                DBs = await r.json();
                document.getElementById('status').textContent = "✅ Base de Datos Conectada";
                
                const sel = document.getElementById('categoria');
                Object.keys(DBs).forEach((c, i) => {
                    if(i===0) catActual = c;
                    const o = document.createElement('option');
                    o.value = c; o.textContent = c;
                    sel.appendChild(o);
                });
                draw();
            } catch(e) { document.getElementById('status').textContent = "❌ Error: data.json no encontrado"; }
        }

        function draw() {
            const search = clean(document.getElementById('filterTable').value);
            const data = DBs[catActual];
            const h = document.getElementById('hRow');
            const b = document.getElementById('bBody');

            const prods = data.productos.filter(p => clean(p).includes(search));

            h.innerHTML = '<th class="sticky-col p-4 bg-slate-50 text-slate-400 font-bold uppercase border-b">Producto</th>';
            prods.forEach(p => {
                h.innerHTML += `<th class="p-3 border-b bg-slate-50 text-center min-w-[150px] font-bold text-slate-400 border-l">${p}</th>`;
            });

            b.innerHTML = "";
            prods.forEach(rowP => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 border-b transition";
                tr.innerHTML = `<td class="sticky-col p-4 font-extrabold text-slate-700 bg-white border-r shadow-sm">${rowP}</td>`;
                
                prods.forEach(colP => {
                    const td = document.createElement('td');
                    td.className = "p-2 text-center border-l";
                    if(rowP === colP) {
                        td.innerHTML = '<span class="text-slate-200">●</span>';
                    } else {
                        const info = data.compat[pairKey(rowP, colP)];
                        const r = info ? info.riesgo : "";
                        const rClean = clean(r);
                        
                        let c = 'risk-none';
                        if(rClean.includes('alto') || rClean === '5' || rClean === '9') c = 'risk-alto';
                        else if(rClean.includes('med') || rClean === '6' || rClean === '2') c = 'risk-medio';
                        else if(rClean.includes('bajo') || rClean === '1') c = 'risk-bajo';

                        td.innerHTML = `<div class="w-6 h-6 mx-auto rounded-md ${c} cursor-pointer shadow-sm active:scale-90 transition"></div>`;
                        td.onclick = () => {
                            const box = document.getElementById('resBox');
                            box.classList.remove('hidden');
                            document.getElementById('vRiesgo').textContent = r || "SIN DATOS";
                            document.getElementById('vRiesgo').className = "badge " + c;
                            document.getElementById('vLimpieza').textContent = info ? (info.limpieza || "-") : "-";
                            document.getElementById('vNotas').textContent = info ? (info.notas || "Consultar etiqueta.") : `Mezcla no registrada en la matriz de ${catActual}.`;
                            box.scrollIntoView({behavior: 'smooth', block: 'center'});
                        };
                    }
                    tr.appendChild(td);
                });
                b.appendChild(tr);
            });
        }

        document.getElementById('categoria').onchange = (e) => { catActual = e.target.value; draw(); };
        document.getElementById('filterTable').oninput = draw;
        start();
    </script>
</body>
</html>
